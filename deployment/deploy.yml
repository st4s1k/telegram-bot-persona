name: Deploy

# Deployment workflow TEMPLATE for a bot built on telegram-bot-engine. Put this at
# .github/workflows/deploy.yml in YOUR pack repo. It clones the engine, stages your pack via
# PERSONA_PACK (the engine's prepare hook does the staging — *.ts, i18n/, AND tests/*.persona.test.mjs),
# runs the gate with your pack, applies D1 migrations, then `wrangler deploy`s with YOUR wrangler.jsonc.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN — Workers Scripts:Edit + D1:Edit (and Vectorize/AI if you use RAG)
#   ENGINE_SSH_KEY       — a read-only deploy key for the engine repo (omit if the engine is public:
#                          drop the `ssh-key:` line and just use `repository:` + `ref:`)
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# One deploy at a time — never cancel mid-migration/mid-deploy.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # The engine's select-persona.mjs (prepare/pretest hook) reads this: it copies pack/*.ts into
      # engine/src/persona/_pack, merges pack/i18n/*.json, and stages pack/tests/*.persona.test.mjs.
      PERSONA_PACK: ${{ github.workspace }}/pack
    steps:
      - name: Checkout pack (this repo)
        uses: actions/checkout@v4
        with:
          path: pack
      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          repository: <owner>/telegram-bot-engine
          ref: master
          ssh-key: ${{ secrets.ENGINE_SSH_KEY }}   # drop this line if the engine repo is public
          path: engine
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install engine deps (prepare hook stages the pack + its tests via PERSONA_PACK)
        run: npm ci
        working-directory: engine
      - name: Use this repo's wrangler.jsonc (real resource ids)
        run: cp ../pack/wrangler.jsonc ./wrangler.jsonc
        working-directory: engine
      - name: Gate — typecheck + tests (engine + your pack)
        run: npm run check && npm test
        working-directory: engine
      # Migrations BEFORE deploy — `wrangler deploy` does NOT apply them. Idempotent (only new ones run).
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply <your-db-name> --remote
        working-directory: engine
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy
        run: npx wrangler deploy
        working-directory: engine
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
